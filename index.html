<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studyharder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .container {
            display: flex;
            flex: 1;
        }
        .sidebar {
            width: 200px;
            background-color: #f4f4f4;
            padding: 10px;
            overflow-y: auto;
        }
        .sidebar h3 {
            margin-top: 0;
        }
        .sidebar button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .sidebar button:hover {
            background-color: #0056b3;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .game-display {
            flex: 1;
            padding: 10px;
        }
        .youtube-sidebar {
            width: 300px;
            background-color: #f4f4f4;
            padding: 10px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#games">Games</a>
        <a href="#youtube">YouTube</a>
    </nav>
    <div class="container">
        <div class="sidebar">
            <h3>Fun Games</h3>
            <button onclick="loadGame('deltarune')">Deltarune</button>
            <button onclick="loadGame('ovo')">Ovo</button>
            <button onclick="loadGame('fridaynight')">Friday Night Funkin</button>
            <button onclick="loadGame('krunker')">Krunker.io</button>
            <button onclick="loadGame('surviv')">Surviv.io</button>
            <button onclick="loadGame('zombs')">Zombs.io</button>
            <button onclick="loadGame('littlebigsnake')">Little Big Snake</button>
            <button onclick="loadGame('evowars')">EvoWars.io</button>
            <hr>
            <h3>Flappy Bird</h3>
            <button onclick="loadGame('flappybird')">Flappy Bird</button>
            <hr>
            <h3>Owner Mode</h3>
            <input id="owner-password-input" type="password" placeholder="Enter owner password" style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:8px;">
            <button onclick="unlockOwnerMode()" style="background-color:#28a745;">Unlock Owner</button>
            <div id="owner-message" style="margin-top:8px; color:#333;"></div>
        </div>
        <div class="main">
            <div class="game-display" id="game-display">
                <h2>Welcome to Studyharder</h2>
                <p>Select a game from the sidebar to play.</p>
            </div>
        </div>
        <div class="youtube-sidebar">
            <h3>YouTube</h3>
            <iframe src="https://www.youtube.com/embed/jNQXAC9IVRw" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>
    <script>
        const games = {
            deltarune: 'https://deltarune.com/',
            ovo: 'https://ovo.game/',
            fridaynight: 'https://www.fridaynightfunkin.io/',
            krunker: 'https://krunker.io/',
            surviv: 'https://surviv.io/',
            zombs: 'https://zombs.io/',
            littlebigsnake: 'https://littlebigsnake.com/',
            evowars: 'https://evowars.io/',
            flappybird: 'https://flappybird.io/'
        };

        let currentGame = null;

        function loadGame(game) {
            currentGame = game;
            const display = document.getElementById('game-display');
            display.innerHTML = '<div class="loading">Loading game...</div>';
            setTimeout(() => {
                display.innerHTML = `<iframe src="${games[game]}" style="width: 100%; height: 100%; border: none;"></iframe>`;
                const jumpButton = document.createElement('button');
                jumpButton.textContent = 'Forward me into this game';
                jumpButton.style.marginTop = '10px';
                jumpButton.style.padding = '10px';
                jumpButton.style.cursor = 'pointer';
                jumpButton.onclick = goToGame;
                display.appendChild(jumpButton);
            }, 500);
        }

        function goToGame() {
            if (!currentGame || !games[currentGame]) {
                alert('No game is currently loaded. Select a game first.');
                return;
            }
            window.location.href = games[currentGame];
        }

        function unlockOwnerMode() {
            const passwordInput = document.getElementById('owner-password-input');
            const message = document.getElementById('owner-message');
            const ownerPassword = 'drethereal';

            if (passwordInput.value === ownerPassword) {
                message.style.color = '#28a745';
                message.textContent = 'Owner mode unlocked. Welcome, owner!';
                const display = document.getElementById('game-display');
                display.innerHTML = `
                    <h2>Owner Panel</h2>
                    <p>Owner mode enabled. Access cheats and high score editor.</p>
                    <h3>Cheats</h3>
                    <button onclick="activateCheat('flappybird', 'infinite')">Flappy Bird: Infinite Life</button><br><br>
                    <button onclick="activateCheat('flappybird', 'highscore')">Flappy Bird: Infinite High Score</button><br><br>
                    <button onclick="activateCheat('all', 'godmode')">All Games: God Mode</button><br><br>
                    <button onclick="activateCheat('all', 'unlimited')">All Games: Unlimited Resources</button><br><br>
                    <h3>High Score Editor</h3>
                    <input id="highscore-game" placeholder="Game name (e.g., flappybird)" style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:8px;"><br>
                    <input id="highscore-value" type="number" placeholder="New high score" style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:8px;"><br>
                    <button onclick="setHighScore()">Set High Score</button>
                    <div id="highscore-message" style="margin-top:8px; color:#333;"></div>
                `;
            } else {
                message.style.color = '#dc3545';
                message.textContent = 'Invalid password. Try again.';
            }
            passwordInput.value = '';
        }

        const activeCheats = {};

        function activateCheat(game, type) {
            activeCheats[game] = type;
            const display = document.getElementById('game-display');
            const cheatNotice = document.createElement('div');
            cheatNotice.style.marginTop = '10px';
            cheatNotice.style.padding = '8px';
            cheatNotice.style.backgroundColor = '#fff3cd';
            cheatNotice.style.border = '1px solid #ffeeba';
            cheatNotice.style.color = '#856404';
            cheatNotice.textContent = `Cheat activated: ${type} for ${game}. This is a simulated owner-mode cheat state in Studyharder.`;
            display.appendChild(cheatNotice);

            // Persist in localStorage for UX continuity
            localStorage.setItem('studyharder_activeCheats', JSON.stringify(activeCheats));

            if (game !== 'all') {
                const currentFrame = display.querySelector('iframe');
                if (currentFrame && currentFrame.src.includes(game)) {
                    const overlay = document.createElement('div');
                    overlay.style.position = 'absolute';
                    overlay.style.left = '10px';
                    overlay.style.top = '10px';
                    overlay.style.padding = '6px 10px';
                    overlay.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    overlay.style.color = 'white';
                    overlay.style.borderRadius = '4px';
                    overlay.textContent = `Cheat ${type} active`; 
                    display.style.position = 'relative';
                    display.appendChild(overlay);
                    setTimeout(() => overlay.remove(), 4000);
                }
            }

            // Inform user about cross-origin restrictions
            alert(`Cheat activated: ${type} for ${game}. For external iframe games, this only updates Studyharder state; controlling the game itself is blocked by browser security.`);
        }

        function setHighScore() {
            const game = document.getElementById('highscore-game').value;
            const value = document.getElementById('highscore-value').value;
            const message = document.getElementById('highscore-message');
            if (game && value) {
                // Since games are external, this won't affect them, but we can store locally
                localStorage.setItem(`highscore_${game}`, value);
                message.style.color = '#28a745';
                message.textContent = `High score for ${game} set to ${value} (locally stored).`;
            } else {
                message.style.color = '#dc3545';
                message.textContent = 'Please enter game name and score.';
            }
        }
    </script>
</body>
</html>
